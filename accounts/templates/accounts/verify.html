<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email | AttendancePro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --deep-amethyst: #540863;
            --royal-purple: #92487A;
            --blush-pink: #E49BA6;
            --pale-blush: #FFD3D5;
            --white: #ffffff;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--pale-blush);
            background-image: radial-gradient(at 0% 0%, hsla(320,100%,90%,1) 0, transparent 50%), 
                              radial-gradient(at 100% 100%, hsla(280,100%,85%,1) 0, transparent 50%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* ===== VERIFICATION CARD ===== */
        .verification-card {
            width: 100%;
            max-width: 440px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            padding: 50px 40px;
            border-radius: 35px;
            box-shadow: 0 25px 50px rgba(84, 8, 99, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.7);
            text-align: center;
        }

        .icon-circle {
            width: 75px;
            height: 75px;
            background: linear-gradient(135deg, var(--deep-amethyst) 0%, var(--royal-purple) 100%);
            color: white;
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            margin: 0 auto 30px;
            box-shadow: 0 15px 30px rgba(84, 8, 99, 0.2);
        }

        h2 {
            color: var(--deep-amethyst);
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #64748b;
            font-size: 0.95rem;
            margin-bottom: 35px;
            line-height: 1.5;
        }

        /* ===== FORM STYLING ===== */
        .otp-input-group {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 16px;
            border-radius: 18px;
            border: 2px solid transparent;
            background-color: #f8fafc;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--deep-amethyst);
            text-align: center;
            letter-spacing: 4px;
            transition: var(--transition);
            outline: none;
        }

        input::placeholder {
            letter-spacing: normal;
            font-weight: 500;
            color: #94a3b8;
        }

        input:focus {
            background-color: var(--white);
            border-color: var(--blush-pink);
            box-shadow: 0 0 0 5px rgba(228, 155, 166, 0.15);
        }

        /* Error/Alert Message */
        .msg {
            background: #fff1f2;
            color: #e11d48;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 20px;
            border: 1px solid #ffe4e6;
        }

        /* ===== BUTTONS ===== */
        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 18px;
            border: none;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-verify {
            background: linear-gradient(135deg, var(--deep-amethyst) 0%, var(--royal-purple) 100%);
            color: white;
            box-shadow: 0 10px 25px rgba(84, 8, 99, 0.2);
            margin-bottom: 15px;
        }

        .btn-verify:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(84, 8, 99, 0.3);
        }

        .btn-resend {
            background-color: transparent;
            color: var(--royal-purple);
            border: 2px solid var(--pale-blush);
        }

        .btn-resend:hover {
            background-color: var(--pale-blush);
            color: var(--deep-amethyst);
        }

        /* ===== FOOTER NOTE ===== */
        .note {
            margin-top: 25px;
            font-size: 0.85rem;
            color: #94a3b8;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        @media (max-width: 480px) {
            .verification-card { padding: 40px 25px; }
        }
    </style>
</head>

<body>

<div class="verification-card">
    <div class="icon-circle">
        <i class="fas fa-shield-halved"></i>
    </div>

    <h2>Confirm Identity</h2>
    <p class="subtitle">Enter the 6-digit verification code sent to your registered email address.</p>

    {% if msg %}
    <div class="msg">
        <i class="fas fa-circle-exclamation me-2"></i> {{ msg }}
    </div>
    {% endif %}

    <form action="{% url 'verify_otp' company_slug=company_slug %}" method="POST">
        {% csrf_token %}
        <div class="otp-input-group">
            <input type="text" 
                   name="otp" 
                   placeholder="0 0 0 0 0 0"
                   maxlength="6"
                   pattern="\d{6}"
                   required>
        </div>

        <button type="submit" class="btn btn-verify">
            <i class="fas fa-check-circle"></i> Verify Account
        </button>
    </form>

    <form action="/accounts/resend-otp/" method="POST">
        {% csrf_token %}
        <button type="submit" class="btn btn-resend">
            <i class="fas fa-rotate-right"></i> Resend Code
        </button>
    </form>

    <div class="note">
        <i class="far fa-clock"></i> Code expires in 5 minutes
    </div>
</div>

</body>
</html>
