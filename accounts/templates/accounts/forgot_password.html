<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Access | AttendancePro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --deep-amethyst: #540863;
            --royal-purple: #92487A;
            --blush-pink: #E49BA6;
            --pale-blush: #FFD3D5;
            --white: #ffffff;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background-color: var(--pale-blush);
            background-image: radial-gradient(at 0% 0%, hsla(320,100%,90%,1) 0, transparent 50%), 
                              radial-gradient(at 100% 100%, hsla(280,100%,85%,1) 0, transparent 50%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
        }

        .login-card {
            width: 100%; max-width: 420px;
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px);
            padding: 50px 40px; border-radius: 35px;
            box-shadow: 0 25px 50px rgba(84, 8, 99, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.7); text-align: center;
            animation: fadeIn 0.6s ease-out;
        }
        input#emailField {
            width: 100%;
    padding: 16px 50px 16px 54px !important;
}

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .brand-logo {
            width: 70px; height: 70px;
            background: linear-gradient(135deg, var(--deep-amethyst) 0%, var(--royal-purple) 100%);
            color: white; border-radius: 22px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; margin: 0 auto 30px;
            box-shadow: 0 15px 30px rgba(84, 8, 99, 0.2);
        }

        h2 { color: var(--deep-amethyst); font-size: 1.8rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 10px; }
        .subtitle { color: #64748b; font-size: 0.95rem; margin-bottom: 30px; line-height: 1.5; }

        .form-group { position: relative; margin-bottom: 20px; text-align: left; }
        .form-group i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--royal-purple); font-size: 1.1rem; transition: var(--transition); }

        input {
            width: 100%; padding: 16px 16px 16px 54px; border-radius: 18px;
            border: 2px solid transparent; background-color: #f8fafc;
            font-size: 1rem; font-weight: 600; color: #1e293b; transition: var(--transition); outline: none;
        }

        input:focus { background-color: var(--white); border-color: var(--blush-pink); box-shadow: 0 0 0 5px rgba(228, 155, 166, 0.15); }
        input:focus + i { color: var(--deep-amethyst); }

        /* Django Messages Styling */
        .alert-box {
            padding: 12px; border-radius: 12px; font-size: 0.85rem; font-weight: 700; margin-bottom: 20px; border: 1px solid;
        }
        .alert-error { background: #fff1f2; color: #e11d48; border-color: #ffe4e6; }
        .alert-success { background: #f0fdf4; color: #16a34a; border-color: #dcfce7; }

        button {
            width: 100%; padding: 16px; border-radius: 18px; border: none;
            background: linear-gradient(135deg, var(--deep-amethyst) 0%, var(--royal-purple) 100%);
            color: white; font-size: 1.1rem; font-weight: 700; cursor: pointer;
            transition: var(--transition); box-shadow: 0 12px 24px rgba(84, 8, 99, 0.2);
        }
/* ગ્રીન સ્ટેટ - જો યુઝર મળી જાય */
input.valid-input, 
input.valid-input:focus {
    border: 2px solid #22c55e !important;
    background-color: #f0fdf4 !important;
    box-shadow: 0 0 0 5px rgba(34, 197, 94, 0.15) !important;
}

/* રેડ સ્ટેટ - જો યુઝર ના મળે */
input.invalid-input, 
input.invalid-input:focus {
    border: 2px solid #ef4444 !important;
    background-color: #fef2f2 !important;
    box-shadow: 0 0 0 5px rgba(239, 68, 68, 0.15) !important;
}

/* સ્ટેટસ આઈકોન સ્ટાઈલ */
.status-icon {
    position: absolute;
    right: 18px;
    top: 50%;
    z-index: 5;
    transform: translateY(-50%);
    font-size: 1.1rem;
    pointer-events: none;
    display: none;
    transition: all 0.3s ease;
}
        button:hover { transform: translateY(-3px); box-shadow: 0 18px 35px rgba(84, 8, 99, 0.3); filter: brightness(1.1); }
        
        .back-link { margin-top: 25px; font-size: 0.95rem; }
        .back-link a { color: var(--royal-purple); text-decoration: none; font-weight: 800; transition: var(--transition); }
        .back-link a:hover { color: var(--deep-amethyst); text-decoration: underline; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="brand-logo"><i class="fas fa-unlock-alt"></i></div>
    <h2>Reset Password</h2>
    <p class="subtitle">Lost your key? Enter your email and we'll send you a recovery code.</p>

    {% if messages %}
        {% for message in messages %}
            <div class="alert-box {% if message.tags == 'error' %}alert-error{% else %}alert-success{% endif %}">
                <i class="fas {% if message.tags == 'error' %}fa-exclamation-circle{% else %}fa-check-circle{% endif %} me-2"></i>
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST" id="resetForm">
        {% csrf_token %}
        <div class="form-group">
            <i class="fas fa-envelope" style="position: absolute; left: 18px; top: 50%; transform: translateY(-50%); z-index: 5;"></i>
            <input type="text" name="email" id="emailField" placeholder="Enter your Email or Username" required autocomplete="off">
            
            <i id="statusIcon" class="status-icon"></i>
        </div>
        <button type="submit" id="submitBtn">
            Send Recovery Code <i class="fas fa-paper-plane ms-2" style="font-size: 0.8rem;"></i>
        </button>
    </form>

    <div class="back-link">
        <i class="fas fa-arrow-left small me-1"></i> 
        <a href="{% url 'login' company_slug %}">Back to Login</a>
    </div>
</div>

<script>
    // Simple Validation & Loading State
    
    const emailField = document.getElementById('emailField');
    const statusIcon = document.getElementById('statusIcon');
    const submitBtn = document.getElementById('submitBtn');
    const company_slug = "{{ company.slug|default:company_slug }}";
    let timeout = null;

    // ૧. AJAX Validation Logic
    emailField.addEventListener('input', function() {
        clearTimeout(timeout);
        const identifier = this.value.trim();

        if (identifier.length > 0) {
            timeout = setTimeout(() => {
                // લૉગિન વખતે વાપરેલી AJAX URL જ અહીં કામ કરશે
                const url = `/accounts/ajax/check-username/?username=${encodeURIComponent(identifier)}&company_slug=${company_slug}`;
                
                fetch(url)
                    .then(response => response.json())
                    .then(data => {
                        if (data.is_taken) {
    // ✅ યુઝર મળ્યો - Green Check
    this.classList.add('valid-input');
    this.classList.remove('invalid-input');
    statusIcon.className = 'fas fa-check-circle status-icon'; // આઈકોન ક્લાસ
    statusIcon.style.color = '#22c55e'; // ગ્રીન કલર
    statusIcon.style.display = 'block'; // બતાવવો
} else {
    // ❌ યુઝર ના મળ્યો - Red Cross
    this.classList.add('invalid-input');
    this.classList.remove('valid-input');
    statusIcon.className = 'fas fa-times-circle status-icon'; // આઈકોન ક્લાસ
    statusIcon.style.color = '#ef4444'; // રેડ કલર
    statusIcon.style.display = 'block'; // બતાવવો
}
                    })
                    .catch(error => console.error('Error:', error));
            }, 500);
        } else {
            this.classList.remove('valid-input', 'invalid-input');
            statusIcon.style.display = 'none';
        }
    });

    // ૨. Form Submission Loading State
    document.getElementById('resetForm').onsubmit = function() {
        submitBtn.innerHTML = '<i class="fas fa-circle-notch fa-spin me-2"></i> Sending...';
        submitBtn.style.opacity = '0.7';
        submitBtn.style.pointerEvents = 'none';
    };

</script>

</body>
</html>
