<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Access | AttendancePro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --deep-amethyst: #540863;
            --royal-purple: #92487A;
            --blush-pink: #E49BA6;
            --pale-blush: #FFD3D5;
            --white: #ffffff;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background-color: var(--pale-blush);
            background-image: radial-gradient(at 0% 0%, hsla(320,100%,90%,1) 0, transparent 50%), 
                              radial-gradient(at 100% 100%, hsla(280,100%,85%,1) 0, transparent 50%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
        }

        .login-card {
            width: 100%; max-width: 420px;
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px);
            padding: 50px 40px; border-radius: 35px;
            box-shadow: 0 25px 50px rgba(84, 8, 99, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.7); text-align: center;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .brand-logo {
            width: 75px; height: 75px;
            background: linear-gradient(135deg, var(--deep-amethyst) 0%, var(--royal-purple) 100%);
            color: white; border-radius: 22px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; margin: 0 auto 30px;
            box-shadow: 0 15px 30px rgba(84, 8, 99, 0.2);
        }

        h2 { color: var(--deep-amethyst); font-size: 1.8rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 10px; }
        .subtitle { color: #64748b; font-size: 0.95rem; margin-bottom: 35px; line-height: 1.5; }

        .form-group { position: relative; margin-bottom: 20px; text-align: left; }
        .form-group i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--royal-purple); font-size: 1.1rem; transition: var(--transition); }

        input {
            width: 100%; padding: 16px 16px 16px 54px; border-radius: 18px;
            border: 2px solid transparent; background-color: #f8fafc;
            font-size: 1.2rem; font-weight: 700; color: var(--deep-amethyst);
            letter-spacing: 4px; text-align: left; transition: var(--transition); outline: none;
        }

        input:focus { background-color: var(--white); border-color: var(--blush-pink); box-shadow: 0 0 0 5px rgba(228, 155, 166, 0.15); }
        input:focus + i { color: var(--deep-amethyst); }

        /* Django Messages Styling */
        .alert-box {
            padding: 12px; border-radius: 12px; font-size: 0.85rem; font-weight: 700; margin-bottom: 20px;
            background: #fff1f2; color: #e11d48; border: 1px solid #ffe4e6;
        }

        button {
            width: 100%; padding: 16px; border-radius: 18px; border: none;
            background: linear-gradient(135deg, var(--deep-amethyst) 0%, var(--royal-purple) 100%);
            color: white; font-size: 1.1rem; font-weight: 700; cursor: pointer;
            transition: var(--transition); box-shadow: 0 12px 24px rgba(84, 8, 99, 0.2);
            margin-top: 10px;
        }

        button:hover { transform: translateY(-3px); box-shadow: 0 18px 35px rgba(84, 8, 99, 0.3); filter: brightness(1.1); }
        button:active { transform: translateY(-1px); }

        .back-link { margin-top: 25px; font-size: 0.9rem; color: #64748b; }
        .back-link a { color: var(--royal-purple); text-decoration: none; font-weight: 800; transition: var(--transition); }
        .back-link a:hover { color: var(--deep-amethyst); text-decoration: underline; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="brand-logo">
        <i class="fas fa-user-check"></i>
    </div>

    <h2>Confirm Identity</h2>
    <p class="subtitle">Please enter the 6-digit code we sent to your registered email address.</p>

    {% if messages %}
        {% for message in messages %}
            <div class="alert-box">
                <i class="fas fa-circle-exclamation me-2"></i> {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST" id="verifyForm">
        {% csrf_token %}
        <div class="form-group">
            <i class="fas fa-key"></i>
            <input type="text" name="otp" id="otpInput" placeholder="••••••" maxlength="6" required autocomplete="off">
        </div>

        <button type="submit" id="submitBtn">
            Verify & Proceed <i class="fas fa-arrow-right ms-2" style="font-size: 0.8rem;"></i>
        </button>
    </form>

    <div class="back-link">
        Did not receive code? 
        <a href="{% url 'forgot_password' company_slug %}">Resend OTP</a>
    </div>
</div>

<script>
    // Loading state for button
    document.getElementById('verifyForm').onsubmit = function() {
        const btn = document.getElementById('submitBtn');
        btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i> Verifying...';
        btn.style.opacity = '0.8';
        btn.style.pointerEvents = 'none';
    };

    // Auto-focus input
    window.onload = function() {
        document.getElementById('otpInput').focus();
    };
</script>

</body>
</html>
