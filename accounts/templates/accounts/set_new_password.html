<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password | AttendancePro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --deep-amethyst: #540863;
            --royal-purple: #92487A;
            --blush-pink: #E49BA6;
            --pale-blush: #FFD3D5;
            --white: #ffffff;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background-color: var(--pale-blush);
            background-image: radial-gradient(at 0% 0%, hsla(320,100%,90%,1) 0, transparent 50%), 
                              radial-gradient(at 100% 100%, hsla(280,100%,85%,1) 0, transparent 50%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
        }

        .login-card {
            width: 100%; max-width: 440px;
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px);
            padding: 50px 40px; border-radius: 35px;
            box-shadow: 0 25px 50px rgba(84, 8, 99, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.7); text-align: center;
            animation: fadeInScale 0.7s ease-out;
        }

        @keyframes fadeInScale { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        .brand-logo {
            width: 75px; height: 75px;
            background: linear-gradient(135deg, var(--deep-amethyst) 0%, var(--royal-purple) 100%);
            color: white; border-radius: 22px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; margin: 0 auto 30px;
            box-shadow: 0 15px 30px rgba(84, 8, 99, 0.2);
        }

        h2 { color: var(--deep-amethyst); font-size: 1.8rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 10px; }
        .subtitle { color: #64748b; font-size: 0.95rem; margin-bottom: 35px; line-height: 1.5; }

        .form-group { position: relative; margin-bottom: 20px; text-align: left; }
        .form-group i.input-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--royal-purple); font-size: 1.1rem; }
        
        .toggle-password {
            position: absolute; right: 18px; top: 50%; transform: translateY(-50%);
            cursor: pointer; color: #94a3b8; transition: 0.2s;
        }
        .toggle-password:hover { color: var(--deep-amethyst); }

        input {
            width: 100%; padding: 16px 45px 16px 54px; border-radius: 18px;
            border: 2px solid transparent; background-color: #f8fafc;
            font-size: 1rem; font-weight: 600; color: #1e293b; transition: var(--transition); outline: none;
        }

        input:focus { background-color: var(--white); border-color: var(--blush-pink); box-shadow: 0 0 0 5px rgba(228, 155, 166, 0.15); }

        .error-msg {
            background: #fff1f2; color: #e11d48; padding: 12px; border-radius: 12px;
            font-size: 0.85rem; font-weight: 700; margin-bottom: 20px; border: 1px solid #ffe4e6;
            display: none; /* Hidden by default */
        }

        button {
            width: 100%; padding: 16px; border-radius: 18px; border: none;
            background: linear-gradient(135deg, var(--deep-amethyst) 0%, var(--royal-purple) 100%);
            color: white; font-size: 1.1rem; font-weight: 700; cursor: pointer;
            transition: var(--transition); box-shadow: 0 12px 24px rgba(84, 8, 99, 0.2);
            margin-top: 10px;
        }

        button:hover { transform: translateY(-3px); box-shadow: 0 18px 35px rgba(84, 8, 99, 0.3); filter: brightness(1.1); }
    </style>
</head>
<body>

<div class="login-card">
    <div class="brand-logo">
        <i class="fas fa-key"></i>
    </div>

    <h2>Set New Password</h2>
    <p class="subtitle">Secure your account with a new, strong password.</p>

    <div id="jsErrorBlock" class="error-msg"></div>
    {% if messages %}
        {% for message in messages %}
            <div class="error-msg" style="display: block;">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <form method="POST" id="passwordForm">
        {% csrf_token %}
        
        <div class="form-group">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" name="password" id="pw1" placeholder="New Password" required>
            <i class="fas fa-eye toggle-password" onclick="togglePw('pw1', this)"></i>
        </div>

        <div class="form-group">
            <i class="fas fa-check-double input-icon"></i>
            <input type="password" name="confirm_password" id="pw2" placeholder="Confirm Password" required>
            <i class="fas fa-eye toggle-password" onclick="togglePw('pw2', this)"></i>
        </div>

        <button type="submit" id="submitBtn">Update Password</button>
    </form>
</div>

<script>
    // 1. Toggle Password Visibility
    function togglePw(inputId, icon) {
        const input = document.getElementById(inputId);
        if (input.type === "password") {
            input.type = "text";
            icon.classList.replace("fa-eye", "fa-eye-slash");
        } else {
            input.type = "password";
            icon.classList.replace("fa-eye-slash", "fa-eye");
        }
    }

    // 2. Client-side Match Validation
    document.getElementById('passwordForm').onsubmit = function(e) {
        const pw1 = document.getElementById('pw1').value;
        const pw2 = document.getElementById('pw2').value;
        const errorBlock = document.getElementById('jsErrorBlock');

        if (pw1 !== pw2) {
            e.preventDefault();
            errorBlock.innerText = "⚠️ Passwords do not match!";
            errorBlock.style.display = "block";
            return false;
        }
        
        // Show loading state
        const btn = document.getElementById('submitBtn');
        btn.innerHTML = '<i class="fas fa-circle-notch fa-spin me-2"></i> Saving...';
        btn.style.opacity = "0.8";
        btn.style.pointerEvents = "none";
    };
</script>

</body>
</html>
