<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login | AttendancePro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --deep-amethyst: #540863;
            --royal-purple: #92487A;
            --blush-pink: #E49BA6;
            --pale-blush: #FFD3D5;
            --white: #ffffff;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        /* input.valid-input, input.valid-input:focus {
        border: 2px solid #22c55e !important;
        background-color: #f0fdf4 !important;
        box-shadow: 0 0 0 5px rgba(34, 197, 94, 0.15) !important;
    }

    input.invalid-input, input.invalid-input:focus {
        border: 2px solid #ef4444 !important;
        background-color: #fef2f2 !important;
        box-shadow: 0 0 0 5px rgba(239, 68, 68, 0.15) !important;
    } */

    .status-icon {
        font-size: 1.1rem;
        display: none;
        transition: all 0.3s ease;
    }
    
    .success-icon { color: #22c55e; display: block; }
    .error-icon { color: #ef4444; display: block; }


        body {
            background-color: var(--pale-blush);
            background-image: radial-gradient(at 0% 0%, hsla(320,100%,90%,1) 0, transparent 50%), 
                              radial-gradient(at 100% 100%, hsla(280,100%,85%,1) 0, transparent 50%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
        }

        .login-card {
            width: 100%; max-width: 420px; background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px); padding: 50px 40px; border-radius: 35px;
            box-shadow: 0 25px 50px rgba(84, 8, 99, 0.1); border: 1px solid rgba(255, 255, 255, 0.7);
            text-align: center; animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .brand-logo {
            width: 70px; height: 70px; background: linear-gradient(135deg, var(--deep-amethyst) 0%, var(--royal-purple) 100%);
            color: white; border-radius: 22px; display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; margin: 0 auto 30px; box-shadow: 0 15px 30px rgba(84, 8, 99, 0.2);
        }

        h2 { color: var(--deep-amethyst); font-size: 2rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 10px; }
        .subtitle { color: #64748b; font-size: 0.95rem; margin-bottom: 35px; }

        .form-group { position: relative; margin-bottom: 20px; text-align: left; }
        .form-group i.input-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--royal-purple); font-size: 1.1rem; }

        input {
            width: 100%; padding: 16px 45px 16px 54px; border-radius: 18px; border: 2px solid transparent;
            background-color: #f8fafc; font-size: 1rem; font-weight: 600; color: #1e293b; outline: none; transition: var(--transition);
        }

        input:focus { background-color: var(--white); border-color: var(--blush-pink); box-shadow: 0 0 0 5px rgba(228, 155, 166, 0.15); }

        .toggle-password {
            position: absolute; right: 18px; top: 50%; transform: translateY(-50%);
            cursor: pointer; color: #94a3b8; transition: 0.2s;
        }
        .toggle-password:hover { color: var(--deep-amethyst); }

        .msg { background: #fff1f2; color: #e11d48; padding: 12px; border-radius: 12px; font-weight: 700; margin-bottom: 20px; border: 1px solid #ffe4e6; font-size: 0.85rem; }

        button {
            width: 100%; padding: 16px; border-radius: 18px; border: none; font-weight: 700; cursor: pointer;
            background: linear-gradient(135deg, var(--deep-amethyst) 0%, var(--royal-purple) 100%); color: white;
            box-shadow: 0 12px 24px rgba(84, 8, 99, 0.2); margin-top: 10px; transition: var(--transition);
        }

        button:hover { transform: translateY(-3px); box-shadow: 0 18px 35px rgba(84, 8, 99, 0.3); filter: brightness(1.1); }

        .extra { margin-top: 30px; font-size: 0.95rem; color: #64748b; }
        .extra a { color: var(--royal-purple); text-decoration: none; font-weight: 800; margin-left: 5px; }

        .forgot-link.disabled { opacity: 0.5; pointer-events: none; cursor: not-allowed; }

        /* આઈકોન માટેની કોમન સ્ટાઇલ */
.status-icon {
    position: absolute;
    right: 18px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 1.1rem;
    display: none; /* શરૂઆતમાં છુપાવેલું */
    z-index: 10;
}

/* પાસવર્ડ આઈકોન કન્ટેનર માટે સુધારો */
.pass-icon-container {
    position: absolute;
    right: 15px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 10;
}

/* આને તમારા style માં સૌથી નીચે એડ કરો અથવા જૂના ક્લાસ સાથે બદલો */
input.valid-input {
    border: 2px solid #22c55e !important;
    background-color: #f0fdf4 !important;
    box-shadow: 0 0 0 5px rgba(34, 197, 94, 0.15) !important;
}

input.invalid-input {
    border: 2px solid #ef4444 !important;
    background-color: #fef2f2 !important;
    box-shadow: 0 0 0 5px rgba(239, 68, 68, 0.15) !important;
}

    </style>
</head>

<body>

<div class="login-card">
    <div class="brand-logo"><i class="fas fa-lock"></i></div>
    <h2>Welcome Back</h2>
    <p class="subtitle">Please enter your credentials to login</p>

    {% if msg %}
    <div class="msg"><i class="fas fa-exclamation-triangle me-2"></i> {{ msg }}</div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <i class="fas fa-user-circle input-icon"></i>
            <input type="text" name="username" id="usernameField" placeholder="Username or Email" required autocomplete="off">
            <i id="userStatusIcon" class="status-icon"></i> 
        </div>

        <div class="form-group" style="position: relative;">
    <i class="fas fa-key input-icon"></i>
    <input type="password" name="password" id="passwordField" placeholder="Password" required>
    <div style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); display: flex; align-items: center; gap: 10px;">
        <i id="passStatusIcon" class="status-icon"></i> <i class="fas fa-eye toggle-password" id="eyeIcon" style="cursor: pointer; color: #94a3b8;"></i>
    </div>
</div>
        
        <div class="text-end mb-3" style="margin-top: -10px;">
            <a href="{% url 'forgot_password' company_slug=company.slug|default:'default' %}" id="forgotLink" class="forgot-link disabled" style="color: var(--royal-purple); font-size: 0.85rem; text-decoration: none; font-weight: 700;">Forgot Password?</a>
        </div>
        
        <button type="submit">Sign In <i class="fas fa-arrow-right ms-2"></i></button>
    </form>

    <div class="extra">
        Don’t have an account? <a href="/accounts/{{ company_slug }}/register/">Register here</a>
    </div>
</div>

<script>
    const usernameField = document.getElementById('usernameField');
    const userStatusIcon = document.getElementById('userStatusIcon');
    const passwordField = document.getElementById('passwordField');
    const passStatusIcon = document.getElementById('passStatusIcon');
    const eyeIcon = document.getElementById('eyeIcon');
    const forgotLink = document.getElementById('forgotLink');
    const company_slug = "{{ company_slug }}"; // ખાતરી કરો કે આ મળે છે

    let timeout = null;

    // ૧. Password Toggle
    eyeIcon.addEventListener('click', function() {
        const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordField.setAttribute('type', type);
        this.classList.toggle('fa-eye-slash');
    });

    // ૨. Universal Status Applier
    function applyStatus(element, icon, isValid) {
        const color = isValid ? '#22c55e' : '#ef4444';
        const bgColor = isValid ? '#f0fdf4' : '#fef2f2';
        const shadow = isValid ? 'rgba(34, 197, 94, 0.15)' : 'rgba(239, 68, 68, 0.15)';
        const iconClass = isValid ? 'fas fa-check-circle' : 'fas fa-times-circle';

        element.style.setProperty('border', `2px solid ${color}`, 'important');
        element.style.setProperty('background-color', bgColor, 'important');
        element.style.setProperty('box-shadow', `0 0 0 5px ${shadow}`, 'important');
        
        icon.className = `${iconClass} status-icon`;
        icon.style.display = 'block';
        icon.style.color = color;

        if (element.id === 'usernameField') {
            if (isValid) {
                forgotLink.classList.remove('disabled');
                forgotLink.style.opacity = "1";
                forgotLink.style.pointerEvents = "auto";
            } else {
                forgotLink.classList.add('disabled');
            }
        }
    }

    // ૩. Username Check
    usernameField.addEventListener('input', function() {
    clearTimeout(timeout);
    const username = this.value.trim();
    const self = this;
    const icon = document.getElementById('userStatusIcon');

    if (username.length > 0) {
        timeout = setTimeout(() => {
            // પાથ એકદમ ચેક કરજો: /attendance/ajax/check-username/
            const url = `/attendance/ajax/check-username/?username=${encodeURIComponent(username)}&company_slug=${company_slug}`;
            
            fetch(url)
                .then(response => {
                    if (!response.ok) throw new Error('Network Error');
                    return response.json();
                })
                .then(data => {
                    if (data.is_taken) {
                        // ✅ FORCE GREEN STYLE
                        self.style.setProperty('border', '2px solid #22c55e', 'important');
                        self.style.setProperty('background-color', '#f0fdf4', 'important');
                        
                        icon.className = 'fas fa-check-circle status-icon';
                        icon.style.display = 'block';
                        icon.style.color = '#22c55e';
                        
                        forgotLink.classList.remove('disabled');
                        forgotLink.style.opacity = "1";
                        forgotLink.style.pointerEvents = "auto";
                    } else {
                        // ❌ FORCE RED STYLE
                        self.style.setProperty('border', '2px solid #ef4444', 'important');
                        self.style.setProperty('background-color', '#fef2f2', 'important');
                        
                        icon.className = 'fas fa-times-circle status-icon';
                        icon.style.display = 'block';
                        icon.style.color = '#ef4444';
                        
                        forgotLink.classList.add('disabled');
                    }
                })
                .catch(err => {
                    console.error("AJAX Error:", err);
                    // જો એરર આવે તો બોર્ડર લાલ કરી દો જેથી ખબર પડે
                    self.style.border = "2px solid orange"; 
                });
        }, 30);
    } else {
        self.style.border = "";
        self.style.backgroundColor = "";
        icon.style.display = 'none';
    }
});
    // ૪. Password Check
    passwordField.addEventListener('input', function() {
        clearTimeout(timeout);
        const password = this.value;
        const username = usernameField.value.trim();
        if (password.length > 0 && username.length > 0) {
            timeout = setTimeout(() => {
                const url = `/attendance/ajax/check-password/?username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}&company_slug=${company_slug}`;
                fetch(url)
                    .then(res => res.json())
                    .then(data => applyStatus(passwordField, passStatusIcon, data.is_correct))
                    .catch(err => console.error("AJAX Error:", err));
            }, 30);
        } else {
            this.style.border = "";
            passStatusIcon.style.display = 'none';
        }
    });
</script>
</body>
</html>
