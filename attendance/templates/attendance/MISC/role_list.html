<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Roles Management | Super Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --deep-amethyst: #540863;
            --royal-purple: #92487A;
            --blush-pink: #E49BA6;
            --pale-blush: #FFD3D5;
            --white: #ffffff;
            --danger: #e11d48;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--pale-blush);
            color: #1e293b;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* ===== MAIN CARD ===== */
        .card {
            background: var(--white);
            padding: 40px;
            border-radius: 35px;
            box-shadow: 0 25px 60px rgba(84, 8, 99, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.7);
        }

        header {
            text-align: center;
            margin-bottom: 35px;
        }

        header h2 {
            color: var(--deep-amethyst);
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        /* ===== ADD ROLE FORM ===== */
        .add-role-box {
            background: #fdfaff;
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 35px;
            border: 1px solid #f0e6ff;
        }

        .add-role-box h3 {
            font-size: 1rem;
            color: var(--royal-purple);
            margin-bottom: 15px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-flex {
            display: flex;
            gap: 12px;
        }

        input[type="text"] {
            flex: 1;
            padding: 14px 20px;
            border-radius: 12px;
            border: 2px solid #f1f5f9;
            background-color: var(--white);
            font-size: 0.95rem;
            font-weight: 600;
            outline: none;
            transition: var(--transition);
        }

        input[type="text"]:focus {
            border-color: var(--blush-pink);
            box-shadow: 0 0 0 4px rgba(228, 155, 166, 0.1);
        }

        .btn-add {
            background: linear-gradient(135deg, var(--deep-amethyst) 0%, var(--royal-purple) 100%);
            color: white;
            padding: 0 30px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(84, 8, 99, 0.2);
        }

        /* ===== TABLE STYLING ===== */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 15px 20px;
            color: var(--royal-purple);
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid #f1f5f9;
        }

        td {
            padding: 18px 20px;
            font-size: 1rem;
            font-weight: 600;
            color: #334155;
            border-bottom: 1px solid #f8fafc;
        }

        tr:hover td {
            background-color: #fdfaff;
        }

        .btn-delete {
            color: var(--danger);
            text-decoration: none;
            font-weight: 700;
            font-size: 0.85rem;
            padding: 8px 14px;
            border-radius: 8px;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-delete:hover {
            background-color: #fff1f2;
            transform: translateX(3px);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 30px;
            text-decoration: none;
            color: var(--royal-purple);
            font-weight: 700;
            transition: var(--transition);
        }

        .back-link:hover {
            color: var(--deep-amethyst);
            transform: translateX(-5px);
        }

        @media (max-width: 600px) {
            .form-flex { flex-direction: column; }
            .btn-add { padding: 15px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <header>
            <h2><i class="fas fa-user-tag"></i> System Roles</h2>
        </header>

        <div class="add-role-box">
            <h3>Add New Role</h3>
            <form method="post" action="/attendance/superadmin/roles/add/" class="form-flex">
                {% csrf_token %}
                <input type="text" name="role_name" placeholder="Enter role name (e.g. HR, Manager)" required>
                <button type="submit" class="btn-add">
                    <i class="fas fa-plus"></i> Add Role
                </button>
            </form>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Defined Role Name</th>
                    <th style="text-align: right;">Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for r in roles %}
                <tr>
                    <td>{{ r.name }}</td>
                    <td style="text-align: right;">
                        <a href="/attendance/superadmin/roles/delete/{{ r.id }}/" 
                           class="btn-delete" 
                           onclick="return confirm('Are you sure you want to remove this role?')">
                            <i class="fas fa-trash-alt"></i> Delete
                        </a>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="2" style="text-align: center; padding: 40px; color: #94a3b8;">
                        No roles have been defined yet.
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <a href="/attendance/dashboard/superadmin/" class="back-link">
            <i class="fas fa-arrow-left"></i> Back to Superadmin Dashboard
        </a>
    </div>
</div>

</body>
</html>
