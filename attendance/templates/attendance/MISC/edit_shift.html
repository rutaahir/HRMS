<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Shift | Attendance System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --deep-amethyst: #540863;
            --royal-purple: #92487A;
            --blush-pink: #E49BA6;
            --pale-blush: #FFD3D5;
            --white: #ffffff;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--pale-blush);
            color: #1e293b;
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 650px;
            margin: 0 auto;
            width: 100%;
        }

        /* ===== SUPREME HEADER ===== */
        .page-header {
            background: linear-gradient(135deg, var(--deep-amethyst) 0%, var(--royal-purple) 100%);
            color: white;
            padding: 30px 40px;
            border-radius: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 20px 40px rgba(84, 8, 99, 0.15);
            margin-bottom: 30px;
        }

        .page-header h2 {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .header-badge {
            background: rgba(255, 255, 255, 0.15);
            padding: 8px 16px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.8rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-transform: uppercase;
        }

        /* ===== FORM CARD ===== */
        .card {
            background: var(--white);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 45px rgba(84, 8, 99, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .infobox {
            background: #fdfaff;
            padding: 15px 20px;
            border-left: 5px solid var(--royal-purple);
            border-radius: 12px;
            margin-bottom: 25px;
            color: var(--royal-purple);
            font-weight: 600;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Form Controls */
        .form-group {
            margin-bottom: 22px;
        }

        .label {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--deep-amethyst);
            margin-bottom: 8px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 14px;
            border: 2px solid #f1f5f9;
            background-color: #f8fafc;
            font-size: 1rem;
            font-weight: 600;
            color: #334155;
            outline: none;
            transition: var(--transition);
        }

        input:focus {
            border-color: var(--blush-pink);
            background-color: var(--white);
            box-shadow: 0 0 0 5px rgba(228, 155, 166, 0.1);
        }

        /* ===== BUTTONS ===== */
        .btn-container {
            display: flex;
            gap: 15px;
            margin-top: 35px;
        }

        .btn {
            padding: 14px 24px;
            border-radius: 14px;
            border: none;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 800;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: var(--transition);
            text-decoration: none;
            flex: 1;
        }

        .save {
            background: linear-gradient(135deg, var(--deep-amethyst) 0%, var(--royal-purple) 100%);
            color: white;
            box-shadow: 0 10px 20px rgba(84, 8, 99, 0.2);
        }

        .save:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(84, 8, 99, 0.3);
        }

        .cancel {
            background: #f1f5f9;
            color: #475569;
        }

        .cancel:hover {
            background: #e2e8f0;
            color: #1e293b;
        }

        @media (max-width: 480px) {
            .page-header { padding: 25px; flex-direction: column; text-align: center; gap: 15px; }
            .card { padding: 25px; }
            .btn-container { flex-direction: column; }
        }
    </style>
</head>


<body>

<div class="container">

    <header class="page-header">
        <div>
            <h2><i class="fas fa-edit me-2"></i> Edit Shift</h2>
            <p style="font-size: 0.85rem; opacity: 0.8; margin-top: 5px;">Modify work hours and parameters</p>
        </div>
        <span class="header-badge">Super Admin</span>
    </header>

    <div class="card">
        <div class="infobox">
            <i class="fas fa-clock"></i>
            Editing Shift: <b>{{ shift.name }}</b>
        </div>

        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label class="label"><i class="fas fa-tag me-1"></i> Shift Name</label>
                <input type="text" name="name" value="{{ shift.name }}" required>
            </div>

            <div class="form-group">
                <label class="label"><i class="fas fa-sign-in-alt me-1"></i> Start Time</label>
                <input type="time" name="start_time" value="{{ shift.start_time }}" required>
            </div>

            <div class="form-group">
                <label class="label"><i class="fas fa-sign-out-alt me-1"></i> End Time</label>
                <input type="time" name="end_time" value="{{ shift.end_time }}" required>
            </div>

            <div class="form-group">
                <label class="label"><i class="fas fa-mug-hot me-1"></i> Break Duration (Minutes)</label>
                <input type="number" name="break_minutes" value="{{ shift.break_minutes }}" min="0" required>
            </div>

            <div class="btn-container">
                <button type="submit" class="btn save">
                    <i class="fas fa-sync-alt"></i> Update Shift
                </button>

                <a href="{% url 'shift_list' %}" class="btn cancel">
                    <i class="fas fa-times-circle"></i> Cancel
                </a>
            </div>

        </form>
    </div>

</div>

</body>
</html>
